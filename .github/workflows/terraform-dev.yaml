name: Terraform Dev

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_DIR: .
  TF_PLAN_FILE: tfplan
  TF_PLAN_TEXT: tfplan.txt
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  plan:
    name: Terraform fmt, validate and plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform fmt check
        run: nix develop --command just fmt

      - name: Terraform init
        run: nix develop --command just init

      - name: Terraform validate
        run: nix develop --command just validate

      - name: Terraform plan
        run: nix develop --command just plan

      - name: Upload Terraform plan artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-plan
          path: |
            ${{ env.TF_DIR }}/${{ env.TF_PLAN_FILE }}
            ${{ env.TF_DIR }}/${{ env.TF_PLAN_TEXT }}
          retention-days: 5

  apply:
    name: Terraform apply dev
    runs-on: ubuntu-latest
    needs: plan

    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-plan
          path: ${{ env.TF_DIR }}

      - name: Terraform init
        run: nix develop --command just init

      - name: Terraform apply
        run: nix develop --command just apply